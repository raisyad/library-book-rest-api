services:
  postgres:
   image: postgres:17
   container_name: library-go-postgres
   restart: unless-stopped
   environment:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: library_db_go
   ports:
    - "5432:5432"
   volumes:
    - postgres_data:/var/lib/postgresql/data

volumes:
 postgres_data: